profile: live
instrument_id: BTCUSDT-PERP.BINANCE
order_id_tag: LIVE-001
client_id: BINANCE
timeframe: 5m
htf_timeframe: 1h
lookback_candles: 50
book_depth: 5
book_type: L2_MBP
eval_throttle_ms: 200
require_orderbook: true

signal:
  imbalance_threshold: 0.35
  cvd_smoothing: 5
  absorption_min: 0.25
  stack_min_rows: 3
  ob_imb_threshold: 0.15
  large_vol_ratio_min: 0.10
  price_bucket_size: 1.0
  large_trade_pct: 0.90

risk:
  max_position_fraction: 0.25
  max_notional_usdt: 10000
  max_daily_loss_pct: 3.0
  # FIX: was 10000000 — completely disabled the consecutive-loss circuit breaker.
  max_consecutive_losses: 4
  max_spread_bps: 20.0
  stale_tick_ms: 5000.0
  min_top_of_book_qty: 0.001
  # kill_switch_path: orderflow/.kill_switch

execution:
  use_market_entries: true
  entry_post_only: false
  stoploss_pct: 0.02
  trailing_trigger_pct: 0.015
  trailing_offset_pct: 0.01

  # FIX: prevent re-entry immediately after a losing trade.
  # Strategy will wait this many seconds before accepting a new entry signal.
  loss_cooldown_secs: 60

  # FIX: prevent sub-second exits on intra-candle noise.
  # Signal-reversal exits (cvd_rolling_over etc.) are suppressed until the
  # position has been held for at least this many seconds.
  # Hard stop-loss fires immediately regardless.
  min_hold_secs: 15

binance_environment: DEMO
